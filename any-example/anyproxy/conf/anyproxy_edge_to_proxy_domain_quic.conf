#http->tcp, tcp->http
#curl http://www.example.cn:21104 -k -v
    server {
        domain str = "www.example.cn";

        domain_from_http_v1 raw = r```
                is_open = true
                [check_methods]
                get = true
                post = true
                put = true
                delete = true
                patch = true
                head = true
                options = true
                purge = true
        ```r;

         domain_listen_tcp raw = r```
            address = "0.0.0.0:21104"
        ```r;
        local {
            rule raw = r```
                [[rule]]
                data= ""
                filter = "$$(.*)"
            ```r;
            proxy_pass_upstream str = "upstream1_quic";
        }
    }